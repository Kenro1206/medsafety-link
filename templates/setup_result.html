{% extends "base.html" %}
{% set show_menu = false %}

{% block content %}

<div class="card" style="max-width: 900px;">
  {% if success %}
    <div class="success" style="margin-bottom: 14px;">成功</div>
  {% else %}
    <div class="error" style="margin-bottom: 14px;">失敗</div>
  {% endif %}

  <div style="white-space: pre-wrap;">{{ result_text }}</div>

  <div style="margin-top: 18px;">
    <a href="{{ back_url }}">
      <button type="button">戻る</button>
    </a>
  </div>
</div>

{% endblock %}
