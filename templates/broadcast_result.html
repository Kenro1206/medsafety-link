{% extends "base.html" %}
{% block content %}
<div class="card">
  <p>成功: {{ success }} 件 / 失敗: {{ fail }} 件</p>
  <table>
    <tr><th>患者ID</th><th>氏名</th><th>結果</th><th>詳細</th></tr>
    {% for r in results %}
      <tr><td>{{ r.patient_id }}</td><td>{{ r.name }}</td><td>{% if r.ok %}成功{% else %}失敗{% endif %}</td><td>{{ r.detail }}</td></tr>
    {% else %}
      <tr><td colspan="4" style="text-align:center;color:#666;">送信対象がありません。</td></tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
