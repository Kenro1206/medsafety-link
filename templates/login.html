{% extends "base.html" %}
{% set title = "ログイン" %}
{% set show_menu = false %}

{% block content %}

<div class="card login-card">
  <form method="POST">
    <div class="form-row">
      <label for="institution_id">施設ID</label><br>
      <input type="text" id="institution_id" name="institution_id" value="{{ saved_institution_id }}" autocomplete="username" required>
      <div class="muted">前回ログインした施設IDは保存できます。</div>
    </div>

    <div class="form-row">
      <label for="password">パスワード</label><br>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>

    <div class="form-row">
      <label>
        <input type="checkbox" name="remember_institution" checked>
        この施設IDを保存する
      </label>
      <div class="muted">
        パスワードはこのアプリには保存しません。必要に応じてブラウザの保存機能を使ってください。
        管理者施設でログインした場合は、前回操作していた施設を自動で開きます。
      </div>
    </div>

    <button type="submit">ログイン</button>
  </form>

  <div style="margin-top:14px;border-top:1px solid #eee;padding-top:14px;">
    <a href="/facility/register"><button type="button" style="background:#188038;">新規施設登録</button></a>
    <div class="muted" style="margin-top:8px;">初めて利用する施設は、施設IDとパスワードを作成してください。</div>
  </div>

  {% if message %}
    <div class="error" style="margin-top:12px;">{{ message }}</div>
  {% endif %}
</div>

{% endblock %}
