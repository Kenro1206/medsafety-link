{% extends "base.html" %}
{% set title = "ログイン" %}
{% set show_menu = false %}

{% block content %}
<div class="card login-card">
  <form method="POST">
    <div class="form-row">
      <label for="password">管理者パスワード</label><br>
      <input type="password" id="password" name="password" autocomplete="current-password">
    </div>

    <button type="submit">ログイン</button>
  </form>

  {% if message %}
  <div class="error">{{ message }}</div>
  {% endif %}
</div>
{% endblock %}
