{% extends "base.html" %}
{% set title = "ログイン" %}
{% set show_menu = false %}

{% block content %}

<div class="card login-card">
  <form method="POST">
    <div class="form-row">
      <label for="institution_id">施設ID</label><br>
      <input type="text" id="institution_id" name="institution_id" value="{{ saved_institution_id }}" autocomplete="username" required>
      <div class="muted">前回ログインした施設IDは保存できます。</div>
    </div>

    <div class="form-row">
      <label for="password">パスワード</label><br>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>

    <div class="form-row">
      <label>
        <input type="checkbox" name="remember_institution" checked>
        この施設IDを保存する
      </label>
      <div class="muted">パスワードはこのアプリには保存しません。必要に応じてブラウザの保存機能を使ってください。</div>
    </div>

    <button type="submit">ログイン</button>
  </form>

  {% if message %}
    <div class="error" style="margin-top:12px;">{{ message }}</div>
  {% endif %}
</div>

{% endblock %}
