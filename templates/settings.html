{% extends "base.html" %}
{% set title = "施設設定" %}

{% block content %}

<div class="card">
  <p><strong>ログイン中の施設ID:</strong> {{ institution_id }}</p>
  <p><strong>現在モード:</strong> {{ current_mode }}</p>

  <form method="POST" action="/admin/settings/save">

    <div class="section-title">施設情報</div>

    <div class="form-row">
      <label>施設名</label><br>
      <input name="hospital_name" value="{{ institution.name }}">
    </div>

    <div class="form-row">
      <label>診療科</label><br>
      <input name="department" value="{{ institution.department }}">
    </div>

    <div class="form-row">
      <label>ログインパスワード</label><br>
      <input name="password" value="{{ institution.password }}">
    </div>

    <div class="section-title">LINE設定</div>

    <div class="form-row">
      <label>チャネルアクセストークン</label><br>
      <input name="line_token" value="{{ institution.line.channel_access_token }}">
    </div>

    <div class="form-row">
      <label>管理者LINE ID（カンマ区切り）</label><br>
      <input name="admin_ids" value="{{ ','.join(institution.admins.line_user_ids) }}">
    </div>

    <div class="section-title">Google設定</div>

    <div class="form-row">
      <label>施設専用スプレッドシートID</label><br>
      <input name="spreadsheet_id" value="{{ institution.google.spreadsheet_id }}">
    </div>

    <button type="submit">保存</button>
  </form>
</div>

{% endblock %}
